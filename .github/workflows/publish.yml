name: Publish to npm

# OIDC Trusted Publishing — no npm token required.
#
# One-time setup on npmjs.com (per package):
#   Package → Publishing → Automated Publishing → Add trusted publisher
#     Repository : solutionsunity/odoo-surface-mcp
#     Workflow   : publish.yml
#     Environment: npm
#
# Critical constraints (all three must hold or publish will fail):
#   1. npm 11.5.1+ is required for OIDC support  →  "Upgrade npm" step below
#   2. setup-node must NOT have registry-url      →  registry-url blocks OIDC
#   3. id-token: write permission must be present →  provides the OIDC token

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write  # required for npm OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # NO registry-url — presence of registry-url blocks OIDC auth

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
