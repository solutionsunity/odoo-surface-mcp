name: Publish to npm

# OIDC Trusted Publishing — no npm token required.
#
# One-time setup on npmjs.com (per package):
#   Package → Publishing → Automated Publishing → Add trusted publisher
#     Repository : solutionsunity/odoo-surface-mcp
#     Workflow   : publish.yml
#     Environment: npm
#
# Critical constraints (all three must hold or publish will fail):
#   1. npm 11.5.1+ is required for OIDC support  →  "Upgrade npm" step replaces npm files directly
#   2. registry-url MUST be set in setup-node     →  writes .npmrc registry config; OIDC needs it
#   3. id-token: write permission must be present →  provides the OIDC token
#
# Hard-won lessons from debugging (do not revert these without understanding why):
#
#   ❌ npm install -g npm@latest
#      Fails on GitHub runners with MODULE_NOT_FOUND (promise-retry missing from the
#      bundled npm). The installed npm is broken and cannot upgrade itself.
#
#   ❌ corepack prepare npm@latest --activate
#      Prints "Preparing npm@latest for immediate activation..." but npm --version
#      still shows the old version. Corepack only intercepts `npm` calls when
#      `packageManager` is declared in package.json — without it, PATH is unchanged.
#
#   ❌ omitting registry-url from setup-node
#      Without registry-url, setup-node writes no .npmrc. npm has no registry config
#      anchor and will not attempt the OIDC token exchange → ENEEDAUTH.
#
#   ✅ tarball replacement (current approach)
#      Download the npm tarball via curl/python3 (no npm needed), extract to /tmp,
#      resolve the installed npm path via `node -e process.execPath`, replace in-place
#      with sudo cp. The PATH binary still points to the same wrapper script, but now
#      executes the new npm code. Confirmed by npm --version printing 11.x after the step.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write  # required for npm OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"  # writes .npmrc; OIDC requires this

      - name: Upgrade npm for OIDC support
        run: |
          # npm self-upgrade is broken on runners (missing bundled deps).
          # corepack does not update PATH without packageManager in package.json.
          # Solution: download fresh npm tarball and replace the installed npm files directly.
          NPM_VER=$(python3 -c "import urllib.request,json; print(json.loads(urllib.request.urlopen('https://registry.npmjs.org/npm/latest').read())['version'])")
          echo "Installing npm@${NPM_VER}"
          curl -fsSL "https://registry.npmjs.org/npm/-/npm-${NPM_VER}.tgz" | tar xz -C /tmp
          NPM_LIB=$(node -e "console.log(require('path').join(process.execPath,'..','..','lib','node_modules','npm'))")
          sudo rm -rf "${NPM_LIB}"
          sudo cp -rf /tmp/package "${NPM_LIB}"
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
