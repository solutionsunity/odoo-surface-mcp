name: Feature Request
description: Suggest a new tool, layer, or capability
labels: ["enhancement"]

body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New tool
        - Existing tool improvement
        - New layer
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What can't you do today, or what is awkward?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should the tool do, what should it return?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you tried.
