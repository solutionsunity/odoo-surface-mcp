name: Bug Report
description: Something is not working as expected
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Fill in as much as you can — the Odoo version and MCP client are the most important fields for reproduction.

  - type: dropdown
    id: odoo_version
    attributes:
      label: Odoo Version
      options:
        - "19.0"
        - "18.0"
        - "17.0"
        - "16.0"
        - Other
    validations:
      required: true

  - type: dropdown
    id: odoo_edition
    attributes:
      label: Odoo Edition
      options:
        - Community (CE)
        - Enterprise (EE)
    validations:
      required: true

  - type: input
    id: mcp_client
    attributes:
      label: MCP Client
      description: Where is the MCP server running from?
      placeholder: "e.g. VS Code, JetBrains, Claude Desktop, Cursor, Cline, Windsurf, Claude Code, Codex"
    validations:
      required: true

  - type: input
    id: llm
    attributes:
      label: LLM / Agent
      placeholder: "e.g. Claude, GPT, Gemini, Grok"
    validations:
      required: true

  - type: dropdown
    id: debug_mode
    attributes:
      label: Debug Mode
      options:
        - "No (production)"
        - "Yes (--debug)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Called tool `get_model_actions` with model `sale.order`
        2. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output / logs
      description: Paste any error messages from the MCP client or stderr.
      render: shell
